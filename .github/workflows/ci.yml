name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-workflows-and-shell-linux:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Shell syntax
        shell: bash
        run: find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Action lint
        shell: bash
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Bootstrap
        shell: bash
        run: bash scripts/dev/bootstrap.sh

      - name: Test
        shell: bash
        run: bash scripts/ci/test.sh

      - name: Verify docs manifest
        shell: bash
        run: |
          go run ./tools/cmd/gen-manifest -o docs/generated/manifest.json
          go run ./tools/cmd/verify-docs --manifest docs/generated/manifest.json
          git diff --exit-code -- docs/generated/manifest.json

      - name: Smoke
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   target="linux-x64" ;;
            Windows) target="windows-x64" ;;
            macOS)   target="macos-x64" ;;
            *) echo "unknown runner.os=${{ runner.os }}"; exit 1 ;;
          esac
          tetra_bin="./tetra"
          if [[ -f "./tetra.exe" ]]; then tetra_bin="./tetra.exe"; fi
          "${tetra_bin}" version
          "${tetra_bin}" smoke --target "${target}" --run=true --report "smoke_${target}.json"
          "${tetra_bin}" smoke --target "${target}" --run=true --islands-debug --report "smoke_${target}_islands_debug.json"
          go run ./tools/cmd/smoke-report-to-checklist --validate-only --report "smoke_${target}.json"
          go run ./tools/cmd/smoke-report-to-checklist --validate-only --report "smoke_${target}_islands_debug.json"

      - name: Smoke summary
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   target="linux-x64" ;;
            Windows) target="windows-x64" ;;
            macOS)   target="macos-x64" ;;
            *) echo "unknown runner.os=${{ runner.os }}"; exit 1 ;;
          esac
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          
          def render(path: Path, title: str) -> str:
              data = json.loads(path.read_text(encoding="utf-8"))
              cases = data.get("cases", [])
              passed = sum(1 for c in cases if c.get("pass"))
              total = len(cases)
              lines = []
              lines.append(f"### {title}")
              lines.append("")
              lines.append(f"- Target: `{data.get('target','')}`")
              lines.append(f"- Version: `{data.get('version','')}`")
              lines.append(f"- Git HEAD: `{data.get('git_head','')}`")
              lines.append(f"- Islands debug: `{data.get('islands_debug', False)}`")
              lines.append(f"- Result: **{passed}/{total} passed**")
              lines.append("")
              lines.append("| Case | Build | Run | Expected | Actual | Pass |")
              lines.append("|---|---:|---:|---:|---:|---:|")
              for c in cases:
                  name = c.get("name","")
                  ran = bool(c.get("ran"))
                  actual = c.get("actual_exit")
                  expected = c.get("expected_exit")
                  ok = bool(c.get("pass"))
                  build_ok = "✅" if ok or (c.get("error","").startswith("run:")) else "❌"
                  run_cell = "✅" if ran and ok else ("❌" if ran else "—")
                  actual_cell = "—" if actual is None else str(actual)
                  lines.append(f"| `{name}` | {build_ok} | {run_cell} | {expected} | {actual_cell} | {'✅' if ok else '❌'} |")
              lines.append("")
              return "\n".join(lines)
          
          target = os.environ.get("TARGET","")
          if not target:
              print("missing TARGET env", file=sys.stderr)
              sys.exit(2)
          out = []
          out.append("## Smoke report")
          out.append("")
          out.append(render(Path(f"smoke_{target}.json"), "Normal"))
          out.append(render(Path(f"smoke_{target}_islands_debug.json"), "Islands debug"))
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(out), encoding="utf-8")
          PY
        env:
          TARGET: ${{ runner.os == 'Linux' && 'linux-x64' || runner.os == 'Windows' && 'windows-x64' || 'macos-x64' }}

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        with:
          name: tetra-v0.4.0-${{ github.sha }}-smoke-${{ runner.os }}
          path: |
            smoke_*.json

  test-all-quick-linux:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Bootstrap
        shell: bash
        run: bash scripts/dev/bootstrap.sh

      - name: Quick stabilization wrapper
        shell: bash
        run: bash scripts/ci/test-all.sh --quick --keep-going --report-dir reports/ci-test-all-quick

      - name: Upload quick test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tetra-v0.4.0-${{ github.sha }}-test-all-quick-linux
          path: reports/ci-test-all-quick

  stabilization-linux:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Bootstrap
        shell: bash
        run: bash scripts/dev/bootstrap.sh

      - name: v0.4 stabilization wrapper
        shell: bash
        run: bash scripts/ci/test-all.sh --stabilization --keep-going --report-dir reports/ci-test-all-stabilization

      - name: Upload stabilization test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tetra-v0.4.0-${{ github.sha }}-test-all-stabilization-linux
          path: reports/ci-test-all-stabilization

  release-v0-4-0-readiness-linux:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Bootstrap
        shell: bash
        run: bash scripts/dev/bootstrap.sh

      - name: Current v0.4.0 release readiness
        shell: bash
        run: |
          mkdir -p reports/ci-release-v0.4.0-readiness
          ./tetra features --format=json > reports/ci-release-v0.4.0-readiness/features.json
          ./tetra targets --format=json > reports/ci-release-v0.4.0-readiness/targets.json
          go run ./tools/cmd/validate-v0-4-readiness \
            --expected-version v0.4.0 \
            --features reports/ci-release-v0.4.0-readiness/features.json \
            --targets reports/ci-release-v0.4.0-readiness/targets.json \
            --manifest docs/generated/manifest.json \
            --scope-decisions docs/release/v0_4_0_scope_decisions.json
          go run ./tools/cmd/verify-docs --manifest docs/generated/manifest.json
          go run ./tools/cmd/validate-v0-4-completion-audit --audit docs/release/v0_4_0_completion_audit.md --expected-status achieved

      - name: Upload v0.4.0 release readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tetra-v0.4.0-${{ github.sha }}-release-readiness-linux
          path: reports/ci-release-v0.4.0-readiness

  surface-release-readiness-linux:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Bootstrap
        shell: bash
        run: bash scripts/dev/bootstrap.sh

      - name: Surface release gate
        shell: bash
        run: bash scripts/release/surface/release-gate.sh --report-dir reports/surface-release-v1

      - name: Surface experimental regression gate
        shell: bash
        run: bash scripts/release/surface/gate.sh --report-dir reports/surface-experimental-regression

      - name: Safe view lifetime gate
        shell: bash
        run: bash scripts/release/safe-view-lifetime/gate.sh --report-dir reports/safe-view-lifetime

      - name: Surface API stability gate
        shell: bash
        run: bash scripts/release/surface/api-stability-gate.sh --report-dir reports/surface-api-stability-v1

      - name: Full tests
        shell: bash
        run: |
          go test ./compiler/... ./cli/... ./tools/... -count=1
          go test ./... ./compiler/... ./cli/... ./tools/... -count=1
          bash scripts/ci/test.sh

      - name: Docs and manifest
        shell: bash
        run: |
          go run ./tools/cmd/gen-manifest -o docs/generated/manifest.json
          go run ./tools/cmd/validate-manifest --manifest docs/generated/manifest.json
          go run ./tools/cmd/verify-docs --manifest docs/generated/manifest.json
          git diff --exit-code -- docs/generated/manifest.json

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tetra-surface-release-v1-${{ github.sha }}
          path: |
            reports/surface-release-v1
            reports/surface-experimental-regression
            reports/safe-view-lifetime
            reports/surface-api-stability-v1

  techempower-report-schemas-linux:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Validate TechEmpower report schemas
        shell: bash
        run: |
          go run ./tools/cmd/validate-techempower-report --report docs/benchmarks/techempower_local_smoke_skip_db_report.json --allow-skip-db
          go run ./tools/cmd/validate-techempower-report --report docs/benchmarks/techempower_scram_single_query_local_report.json
          go run ./tools/cmd/validate-techempower-report --report docs/benchmarks/techempower_scram_single_query_matrix_local_report.json
          go run ./tools/cmd/validate-techempower-report --report docs/benchmarks/techempower_scram_endpoint_matrix_local_report.json

  coverage-linux:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Coverage
        shell: bash
        run: |
          go test ./compiler/... ./cli/... ./tools/... -covermode=atomic -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tetra-v0.4.0-${{ github.sha }}-coverage-linux
          path: |
            coverage.out
            coverage.txt

  race-linux:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Race detector
        shell: bash
        run: go test -race ./compiler/... ./cli/... ./tools/... -count=1

  supply-chain-vulnerability-scan-linux:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Install govulncheck
        shell: bash
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.2

      - name: govulncheck
        shell: bash
        run: govulncheck ./compiler/... ./cli/... ./tools/...

  fuzz-short-linux:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Short fuzz smoke
        shell: bash
        run: bash scripts/dev/fuzz-nightly.sh --short --out-dir "$RUNNER_TEMP/fuzz-short"

      - name: Upload fuzz short report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tetra-v0.4.0-${{ github.sha }}-fuzz-short-linux
          path: ${{ runner.temp }}/fuzz-short

  fuzz-nightly-linux:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Nightly fuzz/property/stress
        shell: bash
        run: bash scripts/dev/fuzz-nightly.sh --fuzztime 10m --out-dir "$RUNNER_TEMP/fuzz-nightly"

      - name: Upload fuzz nightly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tetra-v0.4.0-${{ github.sha }}-fuzz-nightly-linux
          path: ${{ runner.temp }}/fuzz-nightly
