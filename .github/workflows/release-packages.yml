name: release-packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.4.0"
        required: true
        default: "v0.4.0"
      dry_run:
        description: "Build packages and upload artifacts without publishing external release outputs"
        required: true
        type: boolean
        default: true
      update_homebrew_tap:
        description: "Commit Formula/tetra.rb to the Homebrew tap repository"
        required: true
        type: boolean
        default: false
      publish_container:
        description: "Publish the release image to GHCR; tag releases always publish"
        required: true
        type: boolean
        default: false
      homebrew_tap_repository:
        description: "owner/repo for the tap; requires HOMEBREW_TAP_TOKEN"
        required: true
        default: "BoSuY0/homebrew-tetra"

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ github.token }}
      HOMEBREW_TAP_REPOSITORY: ${{ inputs.homebrew_tap_repository || 'BoSuY0/homebrew-tetra' }}
      UPDATE_HOMEBREW_TAP: ${{ inputs.update_homebrew_tap && 'true' || 'false' }}
      RELEASE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }} # line-length: ignore
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          case "$version" in
            v*) ;;
            *) version="v${version}" ;;
          esac
          image_owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${image_owner}/tetra-language"
          publish_container="${{ github.event_name != 'workflow_dispatch' || inputs.publish_container }}"
          dry_run="${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}"
          {
            echo "version=${version}"
            echo "image_version=${version#v}"
            echo "image=${image}"
            echo "out_dir=dist/releases/${version}"
            echo "publish_container=${publish_container}"
            echo "dry_run=${dry_run}"
          } >> "$GITHUB_OUTPUT"

      - name: Build release archives
        shell: bash
        run: |
          bash scripts/release/packages/build-release-archives.sh \
            --version "${{ steps.meta.outputs.version }}" \
            --out "${{ steps.meta.outputs.out_dir }}"

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          out_dir="${{ steps.meta.outputs.out_dir }}"
          source_archive="tetra-${version}-source.tar.gz"
          source_sha="$(
            awk -v file="$source_archive" \
              '$2 == file { print $1 }' \
              "$out_dir/checksums.txt"
          )"
          if [[ -z "$source_sha" ]]; then
            echo "missing source archive checksum for $source_archive" >&2
            exit 1
          fi
          source_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${version}/${source_archive}"
          bash scripts/release/packages/render-homebrew-formula.sh \
            --version "$version" \
            --source-url "$source_url" \
            --source-sha256 "$source_sha" \
            --out "$out_dir/tetra.rb"

      - name: Smoke release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          archive="${{ steps.meta.outputs.out_dir }}/tetra-${version}-linux-x64.tar.gz"
          mkdir -p "${{ steps.meta.outputs.out_dir }}/smoke"
          tar -xzf "$archive" -C "${{ steps.meta.outputs.out_dir }}/smoke"
          "${{ steps.meta.outputs.out_dir }}/smoke/tetra-${version}-linux-x64/bin/tetra" version

      - name: Dry-run package proof
        if: env.RELEASE_DRY_RUN == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Build packages and release evidence without creating a GitHub Release, pushing GHCR, or updating Homebrew"
          echo "release-packages dry run: package build, smoke, release gates,"
          echo "and artifact upload will run; external publishing steps are skipped"

      - name: Memory production release gate
        shell: bash
        run: |
          set -euo pipefail
          export GOTELEMETRY=off
          export GOCACHE="${PWD}/.cache/go-build-memory-production-release"
          export GOTMPDIR="${PWD}/.cache/go-tmp-memory-production-release"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          report_dir="${{ steps.meta.outputs.out_dir }}/memory-production-linux-x64"
          bash scripts/release/post_v0_4/memory-production-linux-x64-smoke.sh --report-dir "$report_dir"

      - name: Surface product gate
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y weston ripgrep
          command -v rg
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-product-v1"
          bash scripts/ci/with-headless-wayland.sh --socket wayland-surface-release -- \
            bash scripts/release/surface/product-gate.sh --report-dir "$report_dir"

      - name: Surface experimental regression gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-experimental-regression"
          bash scripts/ci/with-headless-wayland.sh --socket wayland-surface-experimental-release -- \
            bash scripts/release/surface/gate.sh --report-dir "$report_dir"

      - name: Safe view lifetime gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/safe-view-lifetime"
          bash scripts/release/safe-view-lifetime/gate.sh --report-dir "$report_dir"

      - name: Surface API stability gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-api-stability-v1"
          bash scripts/release/surface/api-stability-gate.sh --report-dir "$report_dir"

      - name: Surface final readiness
        shell: bash
        run: |
          set -euo pipefail
          export GOTELEMETRY=off
          export GOCACHE="${PWD}/.cache/go-build-surface-final-readiness-release"
          export GOTMPDIR="${PWD}/.cache/go-tmp-surface-final-readiness-release"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-ui-production-final"
          product_report_dir="${{ steps.meta.outputs.out_dir }}/surface-product-v1"
          mkdir -p "$report_dir"
          go run ./tools/cmd/validate-surface-final-readiness --write --report-dir "$report_dir" --product-report-dir "$product_report_dir" --expected-scope surface-v1-linux-web --current-git-head "${GITHUB_SHA}"
          go run ./tools/cmd/validate-artifact-hashes --write --root "$report_dir" --out "$report_dir/artifact-hashes.json"
          go run ./tools/cmd/validate-artifact-hashes --manifest "$report_dir/artifact-hashes.json"
          go run ./tools/cmd/validate-surface-final-readiness --report-dir "$report_dir" --expected-scope surface-v1-linux-web --require-clean --require-package

      - name: Integrated Memory/Islands/Surface release gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/memory-islands-surface-production"
          bash scripts/ci/with-headless-wayland.sh --socket wayland-memory-islands-surface-release -- \
            bash scripts/release/post_v0_4/memory-islands-surface-production-gate.sh --report-dir "$report_dir"

      - name: RAM contract release gate
        shell: bash
        run: |
          set -euo pipefail
          export GOTELEMETRY=off
          export GOCACHE="${PWD}/.cache/go-build-ram-contract-release"
          export GOTMPDIR="${PWD}/.cache/go-tmp-ram-contract-release"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          report_dir="${{ steps.meta.outputs.out_dir }}/ram-contract-linux-x64"
          bash scripts/release/post_v0_4/ram-contract-linux-x64-smoke.sh --report-dir "$report_dir"

      - name: Actor runtime foundation release gate
        shell: bash
        run: |
          set -euo pipefail
          export GOTELEMETRY=off
          export GOCACHE="${PWD}/.cache/go-build-actor-runtime-foundation-release"
          export GOTMPDIR="${PWD}/.cache/go-tmp-actor-runtime-foundation-release"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          report_dir="${{ steps.meta.outputs.out_dir }}/actor-runtime-foundation-linux-x64"
          bash scripts/release/post_v0_4/actor-runtime-foundation-linux-x64-gate.sh --report-dir "$report_dir"

      - name: Memory100 prod-stable gate
        shell: bash
        run: |
          set -euo pipefail
          export GOTELEMETRY=off
          export GOCACHE="${PWD}/.cache/go-build-memory-100-prod-stable-release"
          export GOTMPDIR="${PWD}/.cache/go-tmp-memory-100-prod-stable-release"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          report_dir="${{ steps.meta.outputs.out_dir }}/memory-100-prod-stable"
          bash scripts/ci/with-headless-wayland.sh --socket wayland-memory-100-release -- \
            bash scripts/release/post_v0_4/memory-100-prod-stable-gate.sh --report-dir "$report_dir"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tetra-${{ steps.meta.outputs.version }}-${{ github.sha }}-release-packages
          path: |
            ${{ steps.meta.outputs.out_dir }}/install.sh
            ${{ steps.meta.outputs.out_dir }}/*.tar.gz
            ${{ steps.meta.outputs.out_dir }}/*.sha256
            ${{ steps.meta.outputs.out_dir }}/checksums.txt
            ${{ steps.meta.outputs.out_dir }}/tetra.rb
            ${{ steps.meta.outputs.out_dir }}/memory-production-linux-x64/**
            ${{ steps.meta.outputs.out_dir }}/surface-product-v1/**
            ${{ steps.meta.outputs.out_dir }}/surface-experimental-regression/**
            ${{ steps.meta.outputs.out_dir }}/safe-view-lifetime/**
            ${{ steps.meta.outputs.out_dir }}/surface-api-stability-v1/**
            ${{ steps.meta.outputs.out_dir }}/surface-ui-production-final/**
            ${{ steps.meta.outputs.out_dir }}/memory-islands-surface-production/**
            ${{ steps.meta.outputs.out_dir }}/ram-contract-linux-x64/**
            ${{ steps.meta.outputs.out_dir }}/actor-runtime-foundation-linux-x64/**
            ${{ steps.meta.outputs.out_dir }}/memory-100-prod-stable/**

      - name: Create or update GitHub Release
        if: steps.meta.outputs.dry_run != 'true' && env.RELEASE_DRY_RUN != 'true' # if: env.RELEASE_DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          out_dir="${{ steps.meta.outputs.out_dir }}"
          notes="$out_dir/release-notes.md"
          release_image="${{ steps.meta.outputs.image }}"
          release_image_version="${{ steps.meta.outputs.image_version }}"
          VERSION="$version" NOTES="$notes" RELEASE_IMAGE="$release_image" RELEASE_IMAGE_VERSION="$release_image_version" PUBLISH_CONTAINER="${{ steps.meta.outputs.publish_container }}" python - <<'PY'
          import os
          import textwrap
          from pathlib import Path

          version = os.environ["VERSION"]
          repository = os.environ["GITHUB_REPOSITORY"]
          image = os.environ["RELEASE_IMAGE"]
          image_version = os.environ["RELEASE_IMAGE_VERSION"]
          publish_container = os.environ["PUBLISH_CONTAINER"] == "true"
          if publish_container:
              container_section = f"""\
          Container:

          ```sh
          docker run --rm {image}:{image_version} tetra version
          ```
          """
          else:
              container_section = "Container publishing was not requested for this manual workflow run.\n"
          notes = Path(os.environ["NOTES"])
          notes.write_text(textwrap.dedent(f"""\
          Tetra Language {version}

          Install Linux x64:

          ```sh
          curl -fsSL https://github.com/{repository}/releases/download/{version}/install.sh | bash
          ```

          {container_section}
          This release publishes the current v0.4.0 local compiler/tooling
          profile. Linux x64 is the release binary baseline; other runtime
          target claims remain gated by project evidence.
          Package publishing for this workflow runs the Linux-x64 memory production release gate and uploads its
          `memory-production-linux-x64.json`, `memory-release-manifest.json`,
          `ram-measurement.json`, `targets.json`, and `artifact-hashes.json`
          evidence.
          RAM Contract Compiler evidence runs the strict Linux-x64 RAM contract release gate before publishing and uploads its
          `ram-contract-release-manifest.json`, `ram-contract-report.json`,
          `memory-grade-report.json`, `proof-store-summary.json`,
          `validation-pipeline-coverage.json`, `heap-blockers.json`,
          `copy-blockers.json`, `fuzz/ram-contract-fuzz-oracle.json`, and
          `artifact-hashes.json` evidence.
          Memory production evidence remains Linux-x64 scoped unless a target-specific runtime gate says otherwise.
          Surface v1 product evidence runs the Surface product gate, experimental regression gate, safe-view lifetime gate, API stability gate, and final readiness validator before publishing.
          Integrated Memory/Islands/Surface evidence runs the strict integrated gate before publishing and uploads its
          `memory-islands-surface-production-manifest.json`,
          `artifact-hashes.json`, `islands-debug-smoke.json`,
          `island-proof-verifier.json`, and
          `island-proof-fuzz-summary.json` evidence.
          Actor runtime foundation evidence runs the strict Linux-x64 gate before publishing and uploads its
          `actor-runtime-foundation-manifest.json`, `artifact-hashes.json`,
          `distributed-actors-linux-x64/distributed-actors-linux-x64.json`,
          and `parallel-production-linux-x64/parallel-production-linux-x64.json`
          evidence.
          Memory100 scoped prod-stable evidence runs the strict aggregate gate before publishing and uploads its
          `memory-100-prod-stable-manifest.json`, `artifact-hashes.json`,
          `runtime-memory/runtime-memory-contract.json`, and
          `proof-transition/proof-transition-report.json` evidence.
          Actor runtime foundation evidence remains Linux-x64 scoped; Erlang/OTP, cluster membership, reconnect/retry production, non-Linux distributed runtime, distributed zero-copy transfer, and formal race proof are not claimed.
          No full Erlang/OTP actor runtime claim; no cluster membership or reconnect/retry production claim; no non-Linux distributed actor runtime support claim; no distributed zero-copy pointer or region transfer claim; no formal race proof claim.
          Surface v1 package notes are scoped to headless, linux-x64
          real-window, and wasm32-web browser-canvas evidence; macOS, Windows,
          wasm32-wasi, GPU rendering, platform-native widgets,
          DOM/React/user-JS app UI, rich text editor, and full screen-reader
          support are not claimed.
          No fastest-language, official benchmark, target parity, or broad zero-cost performance claim is made by these package notes.
          """), encoding="utf-8")
          PY
          go run ./tools/cmd/validate-actor-capabilities --manifest docs/contracts/actors/actor-capability-manifest.v1.json --release-notes "$notes"
          if gh release view "$version" >/dev/null 2>&1; then
            existing_target="$(gh release view "$version" --json targetCommitish -q .targetCommitish)"
            if [[ "$existing_target" != "$GITHUB_SHA" ]]; then
              echo "release target $existing_target does not match current commit $GITHUB_SHA" >&2
              exit 1
            fi
            gh release upload "$version" \
              "$out_dir"/install.sh \
              "$out_dir"/*.tar.gz \
              "$out_dir"/*.sha256 \
              "$out_dir"/checksums.txt \
              "$out_dir"/tetra.rb \
              --clobber
          else
            gh release create "$version" \
              "$out_dir"/install.sh \
              "$out_dir"/*.tar.gz \
              "$out_dir"/*.sha256 \
              "$out_dir"/checksums.txt \
              "$out_dir"/tetra.rb \
              --title "Tetra Language ${version}" \
              --notes-file "$notes" \
              --target "$GITHUB_SHA" \
              --prerelease
          fi

      - name: Build container image
        if: steps.meta.outputs.publish_container == 'true' && steps.meta.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg TETRA_VERSION="${{ steps.meta.outputs.version }}" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_version }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            .

      - name: Publish GHCR image
        if: steps.meta.outputs.publish_container == 'true' && steps.meta.outputs.dry_run != 'true' # if: steps.meta.outputs.publish_container == 'true' && env.RELEASE_DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_version }}"
          docker push "${{ steps.meta.outputs.image }}:latest"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Update Homebrew tap
        if: env.UPDATE_HOMEBREW_TAP == 'true' && steps.meta.outputs.dry_run != 'true' # if: env.UPDATE_HOMEBREW_TAP == 'true' && env.RELEASE_DRY_RUN != 'true'
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is required when update_homebrew_tap is true" >&2
            exit 1
          fi
          tap_repo="${HOMEBREW_TAP_REPOSITORY}"
          work_dir="$(mktemp -d)"
          trap 'rm -rf "$work_dir"' EXIT
          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${tap_repo}.git" \
            "$work_dir/tap"
          mkdir -p "$work_dir/tap/Formula"
          cp "${{ steps.meta.outputs.out_dir }}/tetra.rb" "$work_dir/tap/Formula/tetra.rb"
          git -C "$work_dir/tap" config user.name "github-actions[bot]"
          git -C "$work_dir/tap" config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$work_dir/tap" add Formula/tetra.rb
          if git -C "$work_dir/tap" diff --cached --quiet; then
            echo "Homebrew tap already up to date"
          else
            git -C "$work_dir/tap" commit -m \
              "Update Tetra formula to ${{ steps.meta.outputs.version }}"
            git -C "$work_dir/tap" push
          fi
