name: release-packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. v0.4.0"
        required: true
        default: "v0.4.0"
      update_homebrew_tap:
        description: "Commit Formula/tetra.rb to the Homebrew tap repository"
        required: true
        type: boolean
        default: false
      homebrew_tap_repository:
        description: "owner/repo for the tap; requires HOMEBREW_TAP_TOKEN"
        required: true
        default: "BoSuY0/homebrew-tetra"

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ github.token }}
      HOMEBREW_TAP_REPOSITORY: ${{ inputs.homebrew_tap_repository || 'BoSuY0/homebrew-tetra' }}
      UPDATE_HOMEBREW_TAP: ${{ inputs.update_homebrew_tap && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          case "$version" in
            v*) ;;
            *) version="v${version}" ;;
          esac
          image_owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${image_owner}/tetra-language"
          {
            echo "version=${version}"
            echo "image_version=${version#v}"
            echo "image=${image}"
            echo "out_dir=dist/releases/${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Build release archives
        shell: bash
        run: bash scripts/release/packages/build-release-archives.sh --version "${{ steps.meta.outputs.version }}" --out "${{ steps.meta.outputs.out_dir }}"

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          out_dir="${{ steps.meta.outputs.out_dir }}"
          source_archive="tetra-${version}-source.tar.gz"
          source_sha="$(awk -v file="$source_archive" '$2 == file { print $1 }' "$out_dir/checksums.txt")"
          if [[ -z "$source_sha" ]]; then
            echo "missing source archive checksum for $source_archive" >&2
            exit 1
          fi
          source_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${version}/${source_archive}"
          bash scripts/release/packages/render-homebrew-formula.sh \
            --version "$version" \
            --source-url "$source_url" \
            --source-sha256 "$source_sha" \
            --out "$out_dir/tetra.rb"

      - name: Smoke release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          archive="${{ steps.meta.outputs.out_dir }}/tetra-${version}-linux-x64.tar.gz"
          mkdir -p "${{ steps.meta.outputs.out_dir }}/smoke"
          tar -xzf "$archive" -C "${{ steps.meta.outputs.out_dir }}/smoke"
          "${{ steps.meta.outputs.out_dir }}/smoke/tetra-${version}-linux-x64/bin/tetra" version

      - name: Memory production release gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/memory-production-linux-x64"
          bash scripts/release/post_v0_4/memory-production-linux-x64-smoke.sh --report-dir "$report_dir"

      - name: Surface release gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-release-v1"
          bash scripts/release/surface/release-gate.sh --report-dir "$report_dir"

      - name: Surface experimental regression gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-experimental-regression"
          bash scripts/release/surface/gate.sh --report-dir "$report_dir"

      - name: Safe view lifetime gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/safe-view-lifetime"
          bash scripts/release/safe-view-lifetime/gate.sh --report-dir "$report_dir"

      - name: Surface API stability gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-api-stability-v1"
          bash scripts/release/surface/api-stability-gate.sh --report-dir "$report_dir"

      - name: Surface package distribution gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-package-distribution"
          bash scripts/release/surface/package-gate.sh --report-dir "$report_dir"

      - name: Surface security sandbox gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-security-sandbox"
          bash scripts/release/surface/security-gate.sh --report-dir "$report_dir"

      - name: Surface IPC lifecycle gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-ipc-lifecycle"
          bash scripts/release/surface/ipc-lifecycle-gate.sh --report-dir "$report_dir"

      - name: Surface crash diagnostics gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-crash-diagnostics"
          bash scripts/release/surface/crash-gate.sh --report-dir "$report_dir"

      - name: Surface i18n localization gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-i18n-localization"
          bash scripts/release/surface/i18n-gate.sh --report-dir "$report_dir"

      - name: Surface performance memory gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-performance-memory"
          bash scripts/release/surface/perf-gate.sh --report-dir "$report_dir"

      - name: Surface widget migration gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-widget-migration"
          bash scripts/release/surface/migration-gate.sh --report-dir "$report_dir"

      - name: Surface production final gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/surface-production-final"
          bash scripts/release/surface/prod-gate.sh --report-dir "$report_dir"

      - name: Integrated Memory/Islands/Surface release gate
        shell: bash
        run: |
          set -euo pipefail
          report_dir="${{ steps.meta.outputs.out_dir }}/memory-islands-surface-production"
          bash scripts/release/post_v0_4/memory-islands-surface-production-gate.sh --report-dir "$report_dir"

      - name: RAM contract release gate
        shell: bash
        run: |
          set -euo pipefail
          export GOTELEMETRY=off
          export GOCACHE="${PWD}/.cache/go-build-ram-contract-release"
          export GOTMPDIR="${PWD}/.cache/go-tmp-ram-contract-release"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          report_dir="${{ steps.meta.outputs.out_dir }}/ram-contract-linux-x64"
          bash scripts/release/post_v0_4/ram-contract-linux-x64-smoke.sh --report-dir "$report_dir"

      - name: Actor runtime foundation release gate
        shell: bash
        run: |
          set -euo pipefail
          export GOTELEMETRY=off
          export GOCACHE="${PWD}/.cache/go-build-actor-runtime-foundation-release"
          export GOTMPDIR="${PWD}/.cache/go-tmp-actor-runtime-foundation-release"
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          report_dir="${{ steps.meta.outputs.out_dir }}/actor-runtime-foundation-linux-x64"
          bash scripts/release/post_v0_4/actor-runtime-foundation-linux-x64-gate.sh --report-dir "$report_dir"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tetra-${{ steps.meta.outputs.version }}-${{ github.sha }}-release-packages
          path: |
            ${{ steps.meta.outputs.out_dir }}/install.sh
            ${{ steps.meta.outputs.out_dir }}/*.tar.gz
            ${{ steps.meta.outputs.out_dir }}/*.sha256
            ${{ steps.meta.outputs.out_dir }}/checksums.txt
            ${{ steps.meta.outputs.out_dir }}/tetra.rb
            ${{ steps.meta.outputs.out_dir }}/memory-production-linux-x64/**
            ${{ steps.meta.outputs.out_dir }}/surface-release-v1/**
            ${{ steps.meta.outputs.out_dir }}/surface-experimental-regression/**
            ${{ steps.meta.outputs.out_dir }}/safe-view-lifetime/**
            ${{ steps.meta.outputs.out_dir }}/surface-api-stability-v1/**
            ${{ steps.meta.outputs.out_dir }}/surface-package-distribution/**
            ${{ steps.meta.outputs.out_dir }}/surface-security-sandbox/**
            ${{ steps.meta.outputs.out_dir }}/surface-ipc-lifecycle/**
            ${{ steps.meta.outputs.out_dir }}/surface-crash-diagnostics/**
            ${{ steps.meta.outputs.out_dir }}/surface-i18n-localization/**
            ${{ steps.meta.outputs.out_dir }}/surface-performance-memory/**
            ${{ steps.meta.outputs.out_dir }}/surface-widget-migration/**
            ${{ steps.meta.outputs.out_dir }}/surface-production-final/**
            ${{ steps.meta.outputs.out_dir }}/memory-islands-surface-production/**
            ${{ steps.meta.outputs.out_dir }}/ram-contract-linux-x64/**
            ${{ steps.meta.outputs.out_dir }}/actor-runtime-foundation-linux-x64/**

      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          out_dir="${{ steps.meta.outputs.out_dir }}"
          notes="$out_dir/release-notes.md"
          cat > "$notes" <<EOF
          Tetra Language ${version}

          Install Linux x64:

          \`\`\`sh
          curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/${version}/install.sh | bash
          \`\`\`

          Container:

          \`\`\`sh
          docker run --rm ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_version }} tetra version
          \`\`\`

          This release publishes the current v0.4.0 local compiler/tooling profile. Linux x64 is the release binary baseline; other runtime target claims remain gated by project evidence.
          Package publishing for this workflow runs the Linux-x64 memory production release gate and uploads its `memory-production-linux-x64.json`, `targets.json`, and `artifact-hashes.json` evidence.
          RAM Contract Compiler evidence runs the strict Linux-x64 RAM contract release gate before publishing and uploads its `ram-contract-report.json`, `memory-grade-report.json`, `proof-store-summary.json`, `validation-pipeline-coverage.json`, `heap-blockers.json`, `copy-blockers.json`, and `ram-contract-fuzz-oracle.json` evidence.
          Memory production evidence remains Linux-x64 scoped unless a target-specific runtime gate says otherwise.
          Surface v1 release evidence runs the Surface release gate, experimental regression gate, safe-view lifetime gate, and API stability gate before publishing.
          Surface package distribution evidence runs the scoped package gate and uploads `surface-package-report.json`, package-root artifacts, install smoke evidence, and `artifact-hashes.json`; Windows/macOS signing/notarization and auto-update production remain nonclaims until target-specific evidence exists.
          Surface security sandbox evidence runs the scoped security gate and uploads `surface-security-report.json`, `surface-permissions.json`, and `artifact-hashes.json`; network/filesystem/clipboard host calls without permission, unsafe assets, user JavaScript, remote code execution, packages without hashes, and untyped IPC remain rejected.
          Surface IPC/lifecycle evidence runs the scoped IPC lifecycle gate and uploads `surface-ipc-lifecycle-report.json` and `artifact-hashes.json`; Surface handle/frame/event actor transfers, borrowed payload transfer, untyped IPC, and background UI mutation without dispatcher remain rejected.
          Surface crash diagnostics evidence runs the scoped crash gate and uploads `surface-crash-report.json`, sanitized diagnostic bundles, and `artifact-hashes.json`; swallowed crashes, secret leaks, missing source locations, missing diagnostic bundles, unsurfaced errors, and production dev overlays remain rejected.
          Surface i18n localization evidence runs the scoped i18n gate and uploads `surface-i18n-report.json`, locale resources, locale manifest, and `artifact-hashes.json`; full bidi shaping, silent locale fallback, full ICU/CLDR, and unsupported host localization claims remain rejected.
          Surface performance memory evidence runs the scoped perf gate and uploads `surface-perf-report.json`, baseline artifacts, Electron comparison nonclaim artifacts, and `artifact-hashes.json`; unsupported faster-than-Electron claims, fastest UI framework claims, zero memory overhead claims, missing baseline environments, impossible numbers, and unbounded caches remain rejected.
          Surface widget migration evidence runs the scoped migration gate and uploads `surface-migration-report.json`, existing Surface v1 widget example evidence, widget-to-Block/Morph mapping evidence, and `artifact-hashes.json`; widgets as the core final architecture, breaking Surface v1 examples without migration, missing widget mappings, and deprecation before replacement coverage remain rejected.
          Surface production final evidence runs `prod-gate.sh`, uploads `surface-production-final/**`, and validates `PROD_STABLE_SCOPED_LINUX_WEB_APP_UI` only when release, Block/Morph, visual, package, security, IPC/lifecycle, crash, i18n, performance, migration, example-suite, API stability, prod-claim governance, artifact hashes, and CI wiring all pass without `continue-on-error`.
          Integrated Memory/Islands/Surface evidence runs the strict integrated gate before publishing and uploads its `memory-islands-surface-production-manifest.json`, `artifact-hashes.json`, `islands-debug-smoke.json`, `island-proof-verifier.json`, and `island-proof-fuzz-summary.json` evidence.
          Actor runtime foundation evidence runs the strict Linux-x64 gate before publishing and uploads its `actor-runtime-foundation-manifest.json`, `artifact-hashes.json`, `distributed-actors-linux-x64/distributed-actors-linux-x64.json`, and `parallel-production-linux-x64/parallel-production-linux-x64.json` evidence.
          Actor runtime foundation evidence remains Linux-x64 scoped; Erlang/OTP, cluster membership, reconnect/retry production, non-Linux distributed runtime, distributed zero-copy transfer, and formal race proof are not claimed.
          Surface v1 package notes are scoped to headless, linux-x64 real-window, and wasm32-web browser-canvas evidence; macOS, Windows, wasm32-wasi, GPU rendering, platform-native widgets, DOM/React/user-JS app UI, rich text editor, and full screen-reader support are not claimed.
          No fastest-language, official benchmark, target parity, or broad zero-cost performance claim is made by these package notes.
          EOF
          if gh release view "$version" >/dev/null 2>&1; then
            existing_target="$(gh release view "$version" --json targetCommitish -q .targetCommitish)"
            if [[ "$existing_target" != "$GITHUB_SHA" ]]; then
              echo "release target $existing_target does not match current commit $GITHUB_SHA" >&2
              exit 1
            fi
            gh release upload "$version" "$out_dir"/install.sh "$out_dir"/*.tar.gz "$out_dir"/*.sha256 "$out_dir"/checksums.txt "$out_dir"/tetra.rb --clobber
          else
            gh release create "$version" "$out_dir"/install.sh "$out_dir"/*.tar.gz "$out_dir"/*.sha256 "$out_dir"/checksums.txt "$out_dir"/tetra.rb \
              --title "Tetra Language ${version}" \
              --notes-file "$notes" \
              --target "$GITHUB_SHA" \
              --prerelease
          fi

      - name: Build container image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg TETRA_VERSION="${{ steps.meta.outputs.version }}" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_version }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            .

      - name: Publish GHCR image
        shell: bash
        run: |
          set -euo pipefail
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_version }}"
          docker push "${{ steps.meta.outputs.image }}:latest"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Update Homebrew tap
        if: env.UPDATE_HOMEBREW_TAP == 'true'
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is required when update_homebrew_tap is true" >&2
            exit 1
          fi
          tap_repo="${HOMEBREW_TAP_REPOSITORY}"
          work_dir="$(mktemp -d)"
          trap 'rm -rf "$work_dir"' EXIT
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${tap_repo}.git" "$work_dir/tap"
          mkdir -p "$work_dir/tap/Formula"
          cp "${{ steps.meta.outputs.out_dir }}/tetra.rb" "$work_dir/tap/Formula/tetra.rb"
          git -C "$work_dir/tap" config user.name "github-actions[bot]"
          git -C "$work_dir/tap" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$work_dir/tap" add Formula/tetra.rb
          if git -C "$work_dir/tap" diff --cached --quiet; then
            echo "Homebrew tap already up to date"
          else
            git -C "$work_dir/tap" commit -m "Update Tetra formula to ${{ steps.meta.outputs.version }}"
            git -C "$work_dir/tap" push
          fi
