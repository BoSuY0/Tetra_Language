name: Docs or README issue
description: Documentation, README, guides, release notes, examples text, or wording.
title: "[Docs]: "
labels: ["area: docs", "status: needs triage"]
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Bug
        - Feature request
        - Question
        - Docs or wording
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or path to the doc, README section, release page, or example text.
      placeholder: docs/user/start/install.md, README.md, release page, etc.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What should change?
      description: Explain what is missing, stale, confusing, or misleading.
    validations:
      required: true
