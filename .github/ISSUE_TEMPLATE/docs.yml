name: Docs or README issue
description: Report missing, stale, confusing, or misleading documentation.
title: "[Docs]: "
labels: ["type: docs", "area: docs", "status: needs triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which documentation area is affected?
      options:
        - Docs / README
        - Install / packages
        - Compiler
        - Syntax / language design
        - Memory / ownership
        - Runtime / actors / tasks
        - CLI / tooling
        - Examples / tests
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or path to the doc, section, or README area.
      placeholder: docs/user/install.md, README.md, release page, etc.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
      description: Explain what confused you or what should be corrected.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Suggested wording or outcome
      description: Optional wording, links, or acceptance criteria.
    validations:
      required: false
