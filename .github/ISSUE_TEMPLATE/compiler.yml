name: Compiler issue
description: Parser, semantic checks, backend, codegen, or compiler diagnostics.
title: "[Compiler]: "
labels: ["area: compiler", "status: needs triage"]
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Bug
        - Feature request
        - Question
        - Docs or wording
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What compiler behavior should be reviewed?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include source snippets, commands, diagnostics, and expected behavior.
      render: text
    validations:
      required: true
