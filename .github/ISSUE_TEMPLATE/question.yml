name: Question
description: Ask about current Tetra behavior, installation, or project direction.
title: "[Question]: "
labels: ["type: question", "status: needs triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What is the question about?
      options:
        - Compiler
        - Syntax / language design
        - Memory / ownership
        - Runtime / actors / tasks
        - CLI / tooling
        - Docs / README
        - Install / packages
        - Examples / tests
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Ask the question directly and include the context needed to answer it.
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Commands, docs, examples, or assumptions you already checked.
    validations:
      required: false
