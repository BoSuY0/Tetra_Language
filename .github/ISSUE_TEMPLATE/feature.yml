name: Feature request
description: Propose a new capability, workflow, or improvement.
title: "[Feature]: "
labels: ["type: feature", "status: needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for concrete improvements. If the idea is mainly about docs, use the docs form.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Tetra should change?
      options:
        - Compiler
        - Syntax / language design
        - Memory / ownership
        - Runtime / actors / tasks
        - CLI / tooling
        - Docs / README
        - Install / packages
        - Examples / tests
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation, pain point, or missing capability should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or API you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other shape you considered, or why existing functionality is not enough.
    validations:
      required: false
