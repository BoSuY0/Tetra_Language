name: Syntax or language design issue
description: Grammar, surface syntax, language design, or parser-facing behavior.
title: "[Syntax]: "
labels: ["area: syntax", "status: needs triage"]
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Bug
        - Feature request
        - Question
        - Docs or wording
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What syntax or language-design topic is this about?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include examples, expected parsing/formatting, and alternatives if relevant.
      render: text
    validations:
      required: true
