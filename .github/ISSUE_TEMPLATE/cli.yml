name: CLI or tooling issue
description: CLI commands, formatting, diagnostics, LSP, project tooling, or developer workflow.
title: "[CLI]: "
labels: ["area: cli", "status: needs triage"]
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Bug
        - Feature request
        - Question
        - Docs or wording
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What CLI or tooling behavior should be reviewed?
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include commands, output, environment, and expected behavior.
      render: shell
    validations:
      required: true
