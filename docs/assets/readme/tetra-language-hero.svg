<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Tetra Language animated banner</title>
  <desc id="desc">A dark animated banner for the Tetra programming language with green paths, colored syntax lanes, and compact language labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020604"/>
      <stop offset="46%" stop-color="#062414"/>
      <stop offset="100%" stop-color="#020604"/>
    </linearGradient>
    <linearGradient id="tetra" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="52%" stop-color="#8cff66"/>
      <stop offset="100%" stop-color="#00ffcc"/>
    </linearGradient>
    <linearGradient id="lanes" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="33%" stop-color="#00eaff"/>
      <stop offset="66%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ff4fd8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .grid { stroke: #0e3d22; stroke-width: 1; opacity: 0.54; }
      .scan { fill: #00ff88; opacity: 0.08; animation: scan 4.2s linear infinite; }
      .sigil { fill: none; stroke: url(#tetra); stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); stroke-dasharray: 520; animation: draw 3.8s ease-in-out infinite alternate; }
      .lane { fill: none; stroke: url(#lanes); stroke-width: 5; stroke-linecap: round; filter: url(#glow); stroke-dasharray: 76 44; animation: flow 2.4s linear infinite; }
      .dot { fill: #00ff88; filter: url(#glow); animation: pulse 1.8s ease-in-out infinite; transform-origin: center; }
      .dot.cyan { fill: #00eaff; animation-delay: 0.3s; }
      .dot.gold { fill: #ffe066; animation-delay: 0.6s; }
      .dot.pink { fill: #ff4fd8; animation-delay: 0.9s; }
      .title { fill: #f2fff8; font: 900 86px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .sub { fill: #baffd7; font: 700 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .mono { fill: #eafff2; font: 800 18px ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; letter-spacing: 0; }
      .chip { fill: #07150d; stroke-width: 2; }
      .green { stroke: #00ff88; }
      .cyan { stroke: #00eaff; }
      .gold { stroke: #ffe066; }
      .pink { stroke: #ff4fd8; }
      .cursor { fill: #00ff88; animation: blink 0.95s steps(2, end) infinite; }
      @keyframes scan {
        from { transform: translateY(-120px); }
        to { transform: translateY(430px); }
      }
      @keyframes draw {
        from { stroke-dashoffset: 520; opacity: 0.62; }
        to { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes flow {
        to { stroke-dashoffset: -120; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.48; transform: scale(0.82); }
        50% { opacity: 1; transform: scale(1); }
      }
      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="420" rx="26"/>
  <rect class="scan" x="0" y="0" width="1200" height="86"/>

  <g>
    <path class="grid" d="M58 42H1142M58 92H1142M58 142H1142M58 192H1142M58 242H1142M58 292H1142M58 342H1142M58 392H1142"/>
    <path class="grid" d="M80 30V390M150 30V390M220 30V390M290 30V390M360 30V390M430 30V390M500 30V390M570 30V390M640 30V390M710 30V390M780 30V390M850 30V390M920 30V390M990 30V390M1060 30V390M1130 30V390"/>
  </g>

  <g transform="translate(88 78)">
    <path class="sigil" d="M0 18H225L180 104H106L58 190H282"/>
    <circle class="dot" cx="0" cy="18" r="8"/>
    <circle class="dot cyan" cx="225" cy="18" r="8"/>
    <circle class="dot gold" cx="106" cy="104" r="8"/>
    <circle class="dot pink" cx="282" cy="190" r="8"/>
  </g>

  <g transform="translate(408 112)">
    <text class="title" x="0" y="0">TETRA</text>
    <rect class="cursor" x="306" y="-74" width="18" height="82" rx="4"/>
    <text class="sub" x="4" y="44">systems language with explicit power</text>
  </g>

  <g transform="translate(410 220)">
    <rect class="chip green" x="0" y="0" width="126" height="42" rx="10"/>
    <text class="mono" x="27" y="27">syntax</text>
    <rect class="chip cyan" x="144" y="0" width="150" height="42" rx="10"/>
    <text class="mono" x="171" y="27">ownership</text>
    <rect class="chip gold" x="312" y="0" width="122" height="42" rx="10"/>
    <text class="mono" x="343" y="27">actors</text>
    <rect class="chip pink" x="452" y="0" width="126" height="42" rx="10"/>
    <text class="mono" x="483" y="27">effects</text>
  </g>

  <g transform="translate(410 318)">
    <path class="lane" d="M0 0H630"/>
    <circle class="dot" cx="0" cy="0" r="7"/>
    <circle class="dot cyan" cx="210" cy="0" r="7"/>
    <circle class="dot gold" cx="420" cy="0" r="7"/>
    <circle class="dot pink" cx="630" cy="0" r="7"/>
    <text class="mono" x="0" y="34">func</text>
    <text class="mono" x="174" y="34">borrow</text>
    <text class="mono" x="382" y="34">task</text>
    <text class="mono" x="591" y="34">io</text>
  </g>
</svg>
