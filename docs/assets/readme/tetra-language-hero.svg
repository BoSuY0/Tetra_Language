<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">Tetra Language minimal banner</title>
  <desc id="desc">A clean static light banner for Tetra Language.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfefd"/>
      <stop offset="55%" stop-color="#f5fff9"/>
      <stop offset="100%" stop-color="#f3fbff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="38%" stop-color="#334155"/>
      <stop offset="39%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="tetraFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f766e" flood-opacity="0.09"/>
    </filter>
    <style><![CDATA[
      .ui { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; }
      .mono { font-family: SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace; }
    ]]></style>
  </defs>

  <rect width="1600" height="560" fill="#ffffff"/>
  <rect x="18" y="18" width="1564" height="524" rx="30" fill="url(#bg)" stroke="#d8f3e4" stroke-width="2"/>

  <circle cx="1320" cy="130" r="88" fill="#eefcf5"/>
  <circle cx="1250" cy="350" r="165" fill="#f4fffb"/>
  <circle cx="1058" cy="120" r="46" fill="#ecfeff"/>

  <path d="M 1040 110 C 1180 90, 1330 120, 1460 185" fill="none" stroke="#c6f6df" stroke-width="2" stroke-dasharray="8 14"/>
  <path d="M 960 406 C 1060 338, 1188 336, 1410 404" fill="none" stroke="#baf2e8" stroke-width="2" stroke-dasharray="10 16"/>

  <g class="ui" transform="translate(88 56)">
    <rect x="0" y="0" width="112" height="34" rx="17" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="18" y="23" font-size="14" font-weight="800" fill="#047857" letter-spacing="2.6">T4 LANG</text>
  </g>

  <g class="ui" transform="translate(88 150)">
    <text x="0" y="0" font-size="76" font-weight="900" fill="url(#brand)" letter-spacing="-4">Tetra Language</text>
    <rect x="640" y="-56" width="124" height="44" rx="22" fill="#ffffff" stroke="#a7f3d0" filter="url(#shadow)"/>
    <text x="667" y="-27" font-size="22" font-weight="800" fill="#047857">v0.4.0</text>
  </g>

  <g class="ui" transform="translate(88 194)">
    <rect x="0" y="14" width="5" height="72" rx="2.5" fill="#22c55e"/>
    <text x="28" y="36" font-size="28" font-weight="520" fill="#334155">Explicit effects. Ownership. Actors. Native execution.</text>
    <line x1="28" y1="56" x2="600" y2="56" stroke="#dbe7e2" stroke-width="2"/>
  </g>

  <g class="ui" transform="translate(88 298)" font-size="19" font-weight="700">
    <g>
      <rect x="0" y="0" width="116" height="40" rx="20" fill="#ffffff" stroke="#d5f5e3"/>
      <text x="18" y="26" fill="#7ba697">v0.4.0</text>
    </g>
    <g transform="translate(132 0)">
      <rect x="0" y="0" width="132" height="40" rx="20" fill="#ffffff" stroke="#d5f5e3"/>
      <text x="18" y="26" fill="#89a7a2">ownership</text>
    </g>
    <g transform="translate(280 0)">
      <rect x="0" y="0" width="92" height="40" rx="20" fill="#ffffff" stroke="#d5f5e3"/>
      <text x="18" y="26" fill="#166534">actors</text>
    </g>
  </g>

  <g transform="translate(88 362)" filter="url(#shadow)">
    <rect x="0" y="0" width="654" height="132" rx="24" fill="#f8fbfa" stroke="#e2ece8"/>
    <circle cx="598" cy="28" r="6" fill="#68c9b0"/>
    <circle cx="620" cy="28" r="6" fill="#d8efeb"/>
    <g class="mono" font-size="18">
      <text x="26" y="36" fill="#94a3b8">func main() -&gt; Int</text>
      <text x="26" y="62" fill="#64748b">uses io:</text>
      <text x="54" y="88"><tspan fill="#0f172a">print(</tspan><tspan fill="#059669">&quot;Hello from Tetra!&quot;</tspan><tspan fill="#0f172a">)</tspan></text>
      <text x="54" y="114" fill="#0f172a">return 0</text>
    </g>
  </g>

  <g transform="translate(958 96)" filter="url(#shadow)">
    <circle cx="240" cy="178" r="186" fill="#ffffff" stroke="#edf7f2"/>
    <path d="M 240 0 L 78 252 L 402 252 Z" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linejoin="round"/>
    <path d="M 240 0 L 178 136 L 78 252 Z" fill="url(#tetraFill)" opacity="0.75"/>
    <path d="M 240 0 L 302 136 L 402 252 Z" fill="#f0fdfa" opacity="0.95"/>
    <path d="M 78 252 L 178 136 L 240 252 Z" fill="#ecfdf5" opacity="0.95"/>
    <path d="M 402 252 L 302 136 L 240 252 Z" fill="#e6fffb" opacity="0.95"/>
    <path d="M 178 136 L 240 0 L 302 136 L 240 252 Z" fill="#bbf7d0" opacity="0.45"/>
    <path d="M 78 252 L 402 252 M 178 136 L 302 136 M 240 0 L 240 252 M 178 136 L 240 252 M 302 136 L 240 252" fill="none" stroke="#6ee7b7" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="240" cy="0" r="7" fill="#10b981"/>
    <circle cx="78" cy="252" r="7" fill="#5eead4"/>
    <circle cx="402" cy="252" r="7" fill="#84cc16"/>
    <circle cx="178" cy="136" r="6" fill="#34d399"/>
    <circle cx="302" cy="136" r="6" fill="#2dd4bf"/>
    <circle cx="240" cy="252" r="6" fill="#10b981"/>
  </g>

  <g fill="#bfeedd">
    <circle cx="1494" cy="92" r="4"/><circle cx="1520" cy="92" r="4"/><circle cx="1546" cy="92" r="4"/>
    <circle cx="1494" cy="118" r="4"/><circle cx="1520" cy="118" r="4"/><circle cx="1546" cy="118" r="4"/>
    <circle cx="1494" cy="144" r="4"/><circle cx="1520" cy="144" r="4"/><circle cx="1546" cy="144" r="4"/>
  </g>
</svg>
